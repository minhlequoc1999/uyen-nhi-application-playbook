        &lt;strong&gt;Minh and Dung&lt;/strong&gt;
        &lt;span&gt;Minh helps during the single weekly meeting and reviews selected work. Dung adds an experienced view of the industry and its roles.&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;text-small text-muted&quot;&gt;ChatGPT is there to help you practise. It should never invent experiences or turn your answers into something that no longer sounds like you.&lt;/p&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;practice-plan&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h3 id=&quot;practice-plan&quot;&gt;Your independent practice between meetings&lt;/h3&gt;
      &lt;span class=&quot;text-small text-muted&quot;&gt;This is your own preparation time&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;prep-grid&quot;&gt;
      &lt;div class=&quot;prep-block&quot;&gt;
        &lt;strong&gt;Psychometric tests&lt;/strong&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Week 1: numerical, verbal, logical, and SJT baseline.&lt;/li&gt;
          &lt;li&gt;Weeks 2–4: two timed sets weekly; classify every error.&lt;/li&gt;
          &lt;li&gt;Before a live test: match the employer&#x27;s provider and format.&lt;/li&gt;
          &lt;li&gt;Use Graduates First for realistic practice and worked solutions; use ChatGPT to talk through mistakes.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;prep-block&quot;&gt;
        &lt;strong&gt;Behavioural interviews&lt;/strong&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Draft eight story outlines before polishing answers.&lt;/li&gt;
          &lt;li&gt;Keep Situation and Task short; emphasise personal Action, Result, and reflection.&lt;/li&gt;
          &lt;li&gt;Run one practice interview with ChatGPT each week and keep track of the same problem areas.&lt;/li&gt;
          &lt;li&gt;Bring the main problem areas to the weekly meeting; use Minh&#x27;s mock time selectively for high-priority roles.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;prep-block&quot;&gt;
        &lt;strong&gt;Consulting&lt;/strong&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Practise case basics independently from August; use part of the weekly meeting for selected live cases with Minh.&lt;/li&gt;
          &lt;li&gt;Reach 15–20 live cases before a first-round interview.&lt;/li&gt;
          &lt;li&gt;Practise fit and personal-impact questions alongside cases.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
      &lt;div class=&quot;prep-block&quot;&gt;
        &lt;strong&gt;Finance and political risk&lt;/strong&gt;
        &lt;ul class=&quot;compact-list&quot;&gt;
          &lt;li&gt;Track two market or policy themes and explain why each matters commercially.&lt;/li&gt;
          &lt;li&gt;Write one short political-risk memo and one market brief in August.&lt;/li&gt;
          &lt;li&gt;Practise division motivation, written exercises, stakeholder judgement, and client recommendations.&lt;/li&gt;
        &lt;/ul&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;prompt-studio&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h3 id=&quot;prompt-studio&quot;&gt;Practise interviews with ChatGPT&lt;/h3&gt;
      &lt;span class=&quot;text-small text-muted&quot;&gt;Choose a session, fill in the fields shown, then copy the finished prompt&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;card prompt-panel&quot;&gt;
      &lt;div class=&quot;prompt-tools&quot;&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;prompt-select&quot;&gt;Choose a session
          &lt;select class=&quot;form-select&quot; id=&quot;prompt-select&quot;&gt;
            &lt;option value=&quot;story-builder&quot;&gt;Build the story bank&lt;/option&gt;
            &lt;option value=&quot;behavioural&quot;&gt;Behavioural interview&lt;/option&gt;
            &lt;option value=&quot;cv-fit&quot;&gt;CV and motivation interview&lt;/option&gt;

            &lt;option value=&quot;finance&quot;&gt;Finance interview&lt;/option&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;cv-rules&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h3 id=&quot;cv-rules&quot;&gt;CV rebuild rules&lt;/h3&gt;
      &lt;span class=&quot;text-small text-muted&quot;&gt;Return the first draft to Minh&lt;/span&gt;

      &lt;div class=&quot;work-item&quot;&gt;&lt;div&gt;&lt;strong&gt;Preparation.&lt;/strong&gt; CV version, stories drafted, psychometric sets completed, mock interviews, case studies, and recurring weak points.&lt;/div&gt;&lt;span class=&quot;owner viz-badge&quot;&gt;Weekly&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;work-item&quot;&gt;&lt;div&gt;&lt;strong&gt;News and questions.&lt;/strong&gt; Two stories to discuss, questions about career paths, and anything to ask Minh or Dung.&lt;/div&gt;&lt;span class=&quot;owner viz-badge&quot;&gt;Weekly&lt;/span&gt;&lt;/div&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;resources&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h3 id=&quot;resources&quot;&gt;Preparation resources&lt;/h3&gt;
      &lt;span class=&quot;text-small text-muted&quot;&gt;Only the tools you need for the current focus&lt;/span&gt;
    &lt;/div&gt;
    &lt;div class=&quot;resource-list&quot;&gt;
      &lt;div class=&quot;resource-row&quot;&gt;&lt;span&gt;WSO CV template&lt;/span&gt;&lt;a href=&quot;https://www.wallstreetoasis.com/resources/templates/word-templates/investment-banking-resume-template&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Open undergraduate template&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;resource-row&quot;&gt;&lt;span&gt;Psychometric practice&lt;/span&gt;&lt;a href=&quot;https://www.graduatesfirst.com/&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Open Graduates First&lt;/a&gt;&lt;/div&gt;
      &lt;div class=&quot;resource-row&quot;&gt;&lt;span&gt;Behavioural guide&lt;/span&gt;&lt;a href=&quot;https://www.notion.so/Guide-to-approaching-behavioral-interviews-1e592fcab1ba80a783abfe74ae36d372&quot; target=&quot;_blank&quot; rel=&quot;noreferrer&quot;&gt;Open Minh&#x27;s Notion guide&lt;/a&gt;&lt;/div&gt;
    &lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;uyen-nhi-playbook&#x27;);
      if (!root) return;

      const phases = {
        &#x27;this-month&#x27;: {
          title: &#x27;Get the basics into good shape&#x27;,
          gate: &#x27;Focus on preparation, not perfect answers&#x27;,
          items: [
            { text: &#x27;Finish a one-page CV using the WSO undergraduate template.&#x27;, taskId: &#x27;cv-draft&#x27; },
            { text: &#x27;Start drafting six to eight behavioural stories.&#x27;, taskId: &#x27;interview-stories&#x27; },
            { text: &#x27;Begin psychometric preparation and understand your weaker areas.&#x27;, taskId: &#x27;psychometric-baseline&#x27; },
            { text: &#x27;Read the news regularly and practise explaining why a story matters.&#x27;, taskId: &#x27;news-habit&#x27; }
          ]
        },
        &#x27;next-month&#x27;: {
          title: &#x27;Begin interview practice&#x27;,
          gate: &#x27;Behavioural interviews first, then case studies&#x27;,
          items: [
            &#x27;Start behavioural mock interviews and improve the stories you drafted this month.&#x27;,
            &#x27;Once those answers feel more natural, use part of the weekly meeting for case-study practice with Minh.&#x27;,
            &#x27;Continue timed psychometric practice and review your mistakes.&#x27;,
            &#x27;Keep following the news and connect it to the roles and industries you are exploring.&#x27;
          ]
        }
      };

      const prompts = {
        &#x27;story-builder&#x27;: `Act as an evidence-first UK graduate interview coach. I am Uyển Nhi, a final-year UCL Politics &amp; International Relations student targeting consulting, political risk/public affairs, and selected global-finance roles. My experience includes a Bank of America Spring Week, a Vietnam Ministry of Foreign Affairs internship, Southeast Asia macroprudential-regulation research, UCL society leadership, mentoring, volunteering, and an EPQ on inflation in Vietnam.

Help me build—not ghostwrite—an eight-story behavioural evidence bank covering leadership, teamwork, conflict, setback, initiative, analysis, persuasion, and integrity.

Rules:
1. Ask one evidence-elicitation question at a time.
2. Push for facts: my personal action, scale, stakeholders, constraints, result, and learning.
3. Never invent a number, outcome, responsibility, or emotion.
4. If an example is weak, explain the evidence gap and ask for a better example.
5. After gathering enough detail, produce a compact table with story name, competency, Situation, Task, Actions, Result, Reflection, and likely follow-up questions.
6. Keep my wording natural and suitable for a UK graduate interview.

Begin by asking which experience I want to unpack first.`,

        behavioural: `Act as a demanding but fair UK graduate interviewer for {{company}} and {{role}}. First ask me to paste the job description and my current CV if they are not already in the conversation.

Run an eight-question mock interview:
- 2 motivation/fit questions;
- 5 behavioural questions selected from leadership, teamwork, conflict, setback, initiative, persuasion, integrity, prioritisation, and ambiguity;
- 1 closing reflection question.

Interview rules:
1. Ask one question at a time and wait for my answer.
2. Ask up to two realistic follow-ups when evidence is vague, collective (“we”), unquantified, or missing a result.
3. Give no hints, model answers, or feedback until the mock ends.
4. Do not let me reuse the same story more than twice.
5. At the end, score each answer from 1–5 for relevance, specificity, personal ownership, judgement, outcome, reflection, and concision.
6. Identify unsupported claims and the three most important improvements.
7. Then let me retry the two weakest answers before showing any improved answer structure.

Start by asking for the firm, role, job description, and CV.`,

        &#x27;cv-fit&#x27;: `Act as a UK graduate recruiter screening me for {{company}} and the {{role}} role. Ask me to paste my CV and the job description, then run a 25-minute CV and motivation interview.

Cover:
- Tell me about yourself;
- Why this role, this division, and this organisation?;
- Why this route rather than my other interests in consulting, public affairs, or finance?;
- detailed questions on my Bank of America, Ministry, research, leadership, and academic experiences;
- one challenge to an apparent weakness or ambiguity in my CV;
- one commercial/current-affairs follow-up relevant to the role.

Ask one question at a time. Probe claims that sound generic. Do not coach during the interview. At the end, rate credibility, coherence, role motivation, evidence, commercial awareness, and concision. Tell me exactly which CV lines invited difficult questions and what evidence I need to strengthen—not what facts to invent.`,

        case: `Act as an interviewer at {{company}} hiring for {{role}}. Run one realistic 35-minute case interview suitable for a final-year undergraduate.

Parameters:
- Choose a case from profitability, market entry, growth, operations, public sector, or financial services. Do not reveal the case type in advance.
- Use interviewer-led pacing but let me own the structure and synthesis.
- Ask me to clarify the objective, build a structure, interpret data, complete calculations, brainstorm, and give a final recommendation.
- Provide all exhibits as compact text tables with sufficient information and consistent units.
- Ask one question at a time and wait for my response.
- Do not reveal the solution or rescue me unless I explicitly ask for a hint; record every hint.
- Correct only a fatal factual misunderstanding during the case.

At the end, score structure, prioritisation, maths accuracy, insight, creativity, business judgement, communication, and synthesis from 1–5. Give an error log, a stronger approach to the two weakest moments, and one follow-up drill. Begin with the case prompt only.`,

        finance: `Act as a UK graduate interviewer for {{company}}, {{division}}, and the {{role}} role. Ask me to paste the job description and CV before starting. Tailor technical depth to the actual division; do not ask investment-banking questions for an operations, risk, research, or compliance role.

Run a 30-minute interview covering:
1. Why this organisation, division, and role?
2. Why finance given my Politics &amp; IR background and interest in consulting/public affairs?
3. Two CV/behavioural questions.
4. Two commercial-awareness questions based on market or macro themes I choose.
5. Three role-appropriate technical or judgement questions.
6. One ethics, risk, or stakeholder scenario.

Ask one question at a time. Probe vague claims, and ask what the development means for clients or the business. Give no feedback until the end. Score motivation, division knowledge, technical accuracy, commercial judgement, evidence, and communication from 1–5. Separate factual errors from weak delivery, then let me retry my two weakest answers.`,

        risk: `Act as a senior interviewer at {{company}}, a UK political-risk, public-affairs, or strategic-communications consultancy, hiring for {{role}}. Ask me to paste the job description and choose one geographic or policy theme.

Run a 30-minute mock that tests:
- motivation for the organisation and client work;
- concise explanation of a current event;
- stakeholder mapping;
- two or three plausible scenarios and signposts;
- commercial or reputational implications for a client;
- a clear recommendation under uncertainty;
- one behavioural example about judgement, writing, persuasion, or competing priorities.

Ask one question at a time and challenge academic answers that do not reach a client implication. Do not reward confident speculation: require me to separate facts, assumptions, and uncertainty. At the end, score analytical rigour, relevance, stakeholder judgement, scenario thinking, commercial orientation, writing/briefing clarity, and intellectual honesty from 1–5. Give me one 10-minute briefing drill based on my weakest area.`,

        hirevue: `Act as an asynchronous video-interview platform for {{company}} and the {{role}} role. Ask me to paste the job description and CV first.

Create six questions: two motivation, three competency/behavioural, and one commercial or situational. Present one question at a time. For each question, tell me to use an external 30-second preparation timer and a 90-second answer timer. I will type or dictate the answer when ready.

Do not react, coach, or ask follow-ups between questions. After all six answers, score structure, relevance, specificity, energy, concision, and completion from 1–5. Flag slow openings, excessive context, weak personal ownership, and missing results. Give me a second six-question set only after I retry the two weakest responses.`,

        written: `Act as the assessor for {{company}}&#x27;s {{role}} written exercise in {{division}}. Create a self-contained source pack of 600–900 words containing relevant facts, a small table, stakeholder views, and two pieces of distracting information. Then give me a realistic task with a 30-minute time limit and a specified output, such as a 400-word client memo or one-page briefing.

Do not provide an outline or hints. Wait for my submission. Then score prioritisation, factual accuracy, structure, judgement, use of evidence, client orientation, tone, and grammar from 1–5. Identify any claims not supported by the source pack. Show a high-quality outline only after scoring my work, then ask me to rewrite the weakest paragraph.`,

        psychometric: `Act as a psychometric-test review tutor, not as a proprietary test provider. I will use Graduates First or an employer&#x27;s official practice material for realistic tests. Your job is to diagnose my mistakes and run short, original drills.

First ask me for: test type (numerical, verbal, logical, SJT, or critical reasoning), my score, time taken, and two questions I found difficult. Then:
1. Classify each error as concept, setup, calculation, reading, judgement, or time management.
2. Explain the shortest reliable solution method.
3. Give me five original questions of the same skill, one at a time, with no copyrighted or recalled employer content.
4. Wait for my answer and time estimate before revealing the worked solution.
5. Maintain an error log and finish with one specific practice goal for the next session.

Do not pretend an invented score predicts employer performance. Begin by asking for my baseline data.`,

        assessment: `Act as an assessor running a UK graduate in-tray exercise at {{company}} for {{role}}. Give me a role brief, an objective, and eight short messages from different stakeholders containing deadlines, dependencies, risks, and at least one conflict.

My tasks will be to:
1. rank the eight items;
2. explain the first three actions and trade-offs;
3. draft two short stakeholder responses; and
4. identify what I would delegate, escalate, or defer.

Do not signal which items matter most. Wait for my full answer, then score prioritisation, judgement, stakeholder management, risk awareness, written communication, and practicality from 1–5. Show where I confused urgency with importance and give a second, shorter scenario targeting my weakest skill.`
      };

      const promptConfigs = {
        behavioural: { company: &#x27;Deloitte&#x27;, role: &#x27;Graduate Consultant&#x27; },
        &#x27;cv-fit&#x27;: { company: &#x27;Deloitte&#x27;, role: &#x27;Graduate Consultant&#x27; },
        case: { company: &#x27;McKinsey &amp; Company&#x27;, role: &#x27;Business Analyst&#x27; },
        finance: { company: &#x27;Fidelity International&#x27;, division: &#x27;Risk Management&#x27;, role: &#x27;Graduate Risk Analyst&#x27; },
        risk: { company: &#x27;Control Risks&#x27;, role: &#x27;Graduate Analyst&#x27; },
        hirevue: { company: &#x27;Deloitte&#x27;, role: &#x27;Graduate Consultant&#x27; },
        written: { company: &#x27;Deloitte&#x27;, division: &#x27;Consulting&#x27;, role: &#x27;Graduate Consultant&#x27; },
        assessment: { company: &#x27;Deloitte&#x27;, role: &#x27;Graduate Consultant&#x27; }
      };

      const promptFieldLabels = {
        company: &#x27;Company or organisation&#x27;,
        role: &#x27;Role or programme&#x27;,
        division: &#x27;Division or career area&#x27;
      };

      const promptValues = Object.fromEntries(
        Object.entries(promptConfigs).map(([key, values]) =&gt; [key, { ...values }])
      );
      const promptTokenPattern = /\{\{(company|role|division)\}\}/g;

      const phaseTitle = root.querySelector(&#x27;#phase-title&#x27;);
      const phaseGate = root.querySelector(&#x27;#phase-gate&#x27;);
      const phaseList = root.querySelector(&#x27;#phase-list&#x27;);
      const taskProgress = root.querySelector(&#x27;#task-progress&#x27;);
      const taskStorageKey = &#x27;uyen-nhi-playbook.tasks.v1&#x27;;
      const taskItems = [...root.querySelectorAll(&#x27;[data-task-id]&#x27;)];
      let taskState = {};

      try {
        taskState = JSON.parse(localStorage.getItem(taskStorageKey) || &#x27;{}&#x27;);
      } catch (_) {
        taskState = {};
      }

      const syncTasks = () =&gt; {
        taskItems.forEach((item) =&gt; {
          const complete = Boolean(taskState[item.dataset.taskId]);
          const checkbox = item.querySelector(&#x27;input[type=&quot;checkbox&quot;]&#x27;);
          item.classList.toggle(&#x27;is-complete&#x27;, complete);
          if (checkbox) checkbox.checked = complete;
        });
        root.querySelectorAll(&#x27;[data-task-ref]&#x27;).forEach((item) =&gt; {
          item.classList.toggle(&#x27;is-complete&#x27;, Boolean(taskState[item.dataset.taskRef]));
        });
        const completed = taskItems.filter((item) =&gt; Boolean(taskState[item.dataset.taskId])).length;
        taskProgress.textContent = `${completed} of ${taskItems.length} goals complete`;
      };

      const saveTasks = () =&gt; {
        try {
          localStorage.setItem(taskStorageKey, JSON.stringify(taskState));
        } catch (_) {
          // The checklist still works for this visit when browser storage is unavailable.
        }
      };

      taskItems.forEach((item) =&gt; {
        const checkbox = item.querySelector(&#x27;input[type=&quot;checkbox&quot;]&#x27;);
        if (!checkbox) return;
        checkbox.addEventListener(&#x27;change&#x27;, () =&gt; {
          taskState[item.dataset.taskId] = checkbox.checked;
          saveTasks();
          syncTasks();
        });
      });

      window.addEventListener(&#x27;storage&#x27;, (event) =&gt; {
        if (event.key !== taskStorageKey) return;
        try {
          taskState = JSON.parse(event.newValue || &#x27;{}&#x27;);
        } catch (_) {
          taskState = {};
        }
        syncTasks();
      });

      root.querySelectorAll(&#x27;[data-phase]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          const phase = phases[button.dataset.phase];
          if (!phase) return;
          root.querySelectorAll(&#x27;[data-phase]&#x27;).forEach((peer) =&gt; {
            const active = peer === button;
            peer.setAttribute(&#x27;aria-pressed&#x27;, String(active));
            peer.classList.toggle(&#x27;btn-primary&#x27;, active);
            peer.classList.toggle(&#x27;btn-ghost&#x27;, !active);
          });
          phaseTitle.textContent = phase.title;
          phaseGate.textContent = phase.gate;
          phaseList.replaceChildren(...phase.items.map((item) =&gt; {
            const li = document.createElement(&#x27;li&#x27;);
            li.textContent = typeof item === &#x27;string&#x27; ? item : item.text;
            if (typeof item !== &#x27;string&#x27; &amp;&amp; item.taskId) {
              li.dataset.taskRef = item.taskId;
              li.classList.add(&#x27;task-reference&#x27;);
            }
            return li;
          }));
          syncTasks();
        });
      });

      const promptSelect = root.querySelector(&#x27;#prompt-select&#x27;);
      const promptFields = root.querySelector(&#x27;#prompt-fields&#x27;);
      const promptFieldsNote = root.querySelector(&#x27;#prompt-fields-note&#x27;);
      const promptText = root.querySelector(&#x27;#prompt-text&#x27;);
      const copyButton = root.querySelector(&#x27;#copy-prompt&#x27;);
      const copyStatus = root.querySelector(&#x27;#copy-status&#x27;);

      const getPromptValue = () =&gt; {
        const key = promptSelect.value;
        const defaults = promptConfigs[key] || {};
        const values = promptValues[key] || {};
        return (prompts[key] || &#x27;&#x27;).replace(promptTokenPattern, (_, field) =&gt; {
          return String(values[field] || defaults[field] || &#x27;&#x27;).trim();
        });
      };

      const renderPromptText = () =&gt; {
        const key = promptSelect.value;
        const template = prompts[key] || &#x27;&#x27;;
        const defaults = promptConfigs[key] || {};
        const values = promptValues[key] || {};
        const parts = [];

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;

      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);

      .then(({ x, y }) =&gt; {

        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;

      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {

  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);

      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger

      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0

      openTooltip(trigger);
      return;
